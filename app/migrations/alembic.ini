# ManusClaw Alembic Configuration
# ==================================
#
# This file configures Alembic for manusclaw database migrations.
#
# Usage:
#   alembic -c app/migrations/alembic.ini upgrade head
#   alembic -c app/migrations/alembic.ini revision --autogenerate -m "description"
#
# The database URL is resolved at runtime by env.py from:
#   1. MANUSCLAW_DB_URL environment variable
#   2. manusclaw's config system
#   3. Default SQLite path: workspace/.sessions/manusclaw.db

[alembic]
# Path to migration scripts (relative to project root)
script_location = app/migrations

# Template used to generate migration files
# file_template = %%(rev)s_%%(slug)s

# Timezone for the revision timestamp
# timezone =

# Max length of characters to apply to the "slug" field
# truncate_slug_length = 40

# Set to 'true' to run the environment during the 'revision' command
# revision_environment = false

# Set to 'true' to allow .hierarchical tracing in revision to file
# recursive_version_locations = false

# Default date format for new revision file names
# output_encoding = utf-8

# Database URL — overridden at runtime by env.py
# Use MANUSCLAW_DB_URL env var or let env.py resolve from manusclaw config
sqlalchemy.url = sqlite:///workspace/.sessions/manusclaw.db

# Post-write hook — runs after a migration file is generated
# post_write_hooks =

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
